- name: Debug file structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== src/ files ==="
          ls -la src/
          echo "=== Python path ==="
          python -c "import sys; print(sys.path)"

      - name: Run AI review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:    ${{ github.event.pull_request.number }}
          REPO:         ${{ github.repository }}
        run: python main.py